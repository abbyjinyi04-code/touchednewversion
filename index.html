<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>她触 Touched · 女女Mentorship</title>
<style>
/* ============ 主题变量 ============ */
:root{
  --bg:#FFF5F7;
  --card:#FFFFFF;
  --rose:#E8829A;
  --rose-soft:#F6C9D4;
  --lav:#C9A8D4;
  --apri:#F2C4A0;
  --ink:#3D2B35;
  --ink-soft:#8A6E78;
  --line:#F3DDE3;
  --shadow:0 8px 28px rgba(232,130,154,.16);
  --shadow-sm:0 4px 14px rgba(201,168,212,.18);
  --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
  overflow:hidden;
}
#app{position:relative;max-width:480px;margin:0 auto;height:100vh;height:100dvh;background:var(--bg);overflow:hidden;}

/* ============ 屏幕容器与切换淡入 ============ */
.screen{
  position:absolute;inset:0;
  display:none;
  flex-direction:column;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:0;
}
.screen.active{display:flex;animation:scrFade .2s ease both;}
@keyframes scrFade{from{opacity:.55;}to{opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.14);}70%{transform:scale(.94);}100%{transform:scale(1);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes petal{0%{transform:translateY(-10px) rotate(0);opacity:0;}10%{opacity:.9;}100%{transform:translateY(120px) rotate(220deg);opacity:0;}}
@keyframes glow{0%,100%{box-shadow:0 0 26px 6px rgba(232,130,154,.32);}50%{box-shadow:0 0 46px 14px rgba(201,168,212,.42);}}
@keyframes spinPetal{to{transform:rotate(360deg);}}

/* ============ 通用 ============ */
.wrap{padding:22px 20px 30px;}
h1,h2,h3{margin:0 0 8px;font-weight:700;letter-spacing:.5px;}
h1{font-size:26px;}
h2{font-size:21px;}
p{margin:0 0 10px;}
.muted{color:var(--ink-soft);}
.center{text-align:center;}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;cursor:pointer;font-size:16px;font-weight:600;font-family:inherit;
  background:linear-gradient(135deg,var(--rose),#EF9DB0);
  color:#fff;padding:14px 26px;border-radius:30px;
  box-shadow:0 8px 20px rgba(232,130,154,.34);
  transition:transform .15s,box-shadow .2s,opacity .2s;
}
.btn:active{transform:scale(.96);}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
.btn.block{width:100%;}
.btn.ghost{background:#fff;color:var(--rose);border:1.5px solid var(--rose-soft);box-shadow:var(--shadow-sm);}
.btn.lav{background:linear-gradient(135deg,var(--lav),#D8BCE2);box-shadow:0 8px 20px rgba(201,168,212,.34);}
.btn.sm{padding:9px 18px;font-size:14px;}
.link{color:var(--ink-soft);font-size:13px;cursor:pointer;text-decoration:none;}
.link:active{opacity:.6;}
input,textarea,select{
  font-family:inherit;font-size:15px;color:var(--ink);
  width:100%;background:#fff;border:1.5px solid var(--line);
  border-radius:16px;padding:13px 15px;outline:none;transition:border .2s,box-shadow .2s;
}
input:focus,textarea:focus,select:focus{border-color:var(--rose-soft);box-shadow:0 0 0 4px rgba(246,201,212,.4);}
textarea{resize:none;min-height:96px;}
label{display:block;font-size:14px;font-weight:600;margin:16px 0 8px;}
.field-hint{font-size:12px;color:var(--ink-soft);margin-top:5px;}

/* ============ 卡片 ============ */
.card{
  background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow-sm);
}

/* ============ 泡泡选项 ============ */
.bubbles{display:flex;flex-wrap:wrap;gap:9px;margin-top:4px;}
.bubble{
  cursor:pointer;user-select:none;
  background:#fff;border:1.5px solid var(--line);color:var(--ink);
  padding:9px 15px;border-radius:22px;font-size:14px;
  transition:transform .12s,background .2s,border .2s,color .2s;
}
.bubble:active{transform:scale(.94);}
.bubble.on{
  background:linear-gradient(135deg,var(--rose-soft),#FBDDE5);
  border-color:var(--rose);color:#B14E66;font-weight:600;
  animation:pop .32s ease;
}
.bubble.lav.on{background:linear-gradient(135deg,#EAD9F0,#F2E6F6);border-color:var(--lav);color:#8C5BA3;}
.bubble.apri.on{background:linear-gradient(135deg,#FBE5D6,#FCEFE3);border-color:var(--apri);color:#C07A45;}

/* ============ 进度条 ============ */
.progress{height:7px;background:#F4E2E8;border-radius:10px;overflow:hidden;margin:6px 0 18px;}
.progress > i{display:block;height:100%;background:linear-gradient(90deg,var(--rose),var(--lav));border-radius:10px;transition:width .4s ease;}

/* ============ 欢迎页 ============ */
#welcome{justify-content:center;align-items:center;text-align:center;background:radial-gradient(circle at 50% 30%,#FFEAF0,#FFF5F7 70%);}
.welcome-lines{min-height:170px;display:flex;flex-direction:column;justify-content:center;gap:14px;padding:0 24px;}
.welcome-lines p{opacity:0;font-size:18px;font-weight:500;}
.welcome-lines p.l0{font-size:24px;font-weight:700;}
.fade-seq{animation:fadeIn .9s ease forwards;}
.badge-wrap{margin-top:18px;display:flex;flex-direction:column;align-items:center;opacity:0;}
.badge-wrap.show{animation:fadeUp .8s ease forwards;}
.badge{
  width:150px;height:150px;border-radius:50%;
  background:radial-gradient(circle at 50% 40%,#fff,#FFEAF0);
  display:flex;align-items:center;justify-content:center;position:relative;
  animation:glow 3.2s ease-in-out infinite,float 4s ease-in-out infinite;
}
.spark{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--apri);opacity:.8;}

/* ============ 顶部栏 ============ */
.topbar{
  position:sticky;top:0;z-index:5;background:rgba(255,245,247,.92);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px 10px;border-bottom:1px solid var(--line);
}
.topbar h2{margin:0;font-size:19px;}
.tabs{display:flex;gap:8px;background:#FBE7EC;padding:5px;border-radius:18px;}
.tab{flex:1;text-align:center;padding:9px 6px;border-radius:14px;font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:.2s;}
.tab.on{background:#fff;color:var(--rose);box-shadow:var(--shadow-sm);}

/* ============ 底部导航 ============ */
#tabbar{
  position:absolute;left:0;right:0;bottom:0;z-index:30;display:none;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  justify-content:space-around;
}
#tabbar.show{display:flex;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--ink-soft);font-size:11px;position:relative;padding:4px 0;transition:.2s;}
.nav-item .ic{font-size:22px;line-height:1;}
.nav-item.on{color:var(--rose);}
.nav-item.on .ic{animation:pop .3s ease;}
.nav-badge{position:absolute;top:0;right:50%;transform:translateX(18px);background:var(--rose);color:#fff;font-size:10px;min-width:16px;height:16px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700;}

/* main scroll area leaves room for tabbar */
.has-tabbar{padding-bottom:78px;}

/* ============ 烦恼屋卡片 ============ */
.qcard{
  background:var(--card);border:1.5px solid var(--line);border-radius:26px;
  box-shadow:var(--shadow);padding:22px;margin:8px 4px;
  display:flex;flex-direction:column;min-height:60vh;
  animation:fadeUp .45s ease both;
}
.qcard:hover{box-shadow:0 14px 36px rgba(232,130,154,.22);}
.tag{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:14px;margin:0 6px 6px 0;}
.tag.ice{background:#E4F0F7;color:#4E84A6;}
.tag.warm{background:#FCEFE0;color:#C08A4A;}
.tag.hot{background:#FBE0E0;color:#D2615E;}
.tag.dom{background:#F0E6F5;color:#8C5BA3;}
.qcontent{font-size:18px;line-height:1.7;margin:16px 0;flex:1;display:flex;align-items:center;}
.qmeta{font-size:13px;color:var(--ink-soft);border-top:1px dashed var(--line);padding-top:12px;}
.qactions{display:flex;gap:12px;margin-top:16px;}
.qactions .btn{flex:1;}

/* ============ 弹层/底部面板 ============ */
.overlay{position:absolute;inset:0;z-index:50;background:rgba(61,43,53,.34);display:none;align-items:flex-end;justify-content:center;animation:fadeIn .25s ease;}
.overlay.show{display:flex;}
.overlay.center{align-items:center;}
.sheet{
  width:100%;max-width:480px;background:var(--bg);
  border-radius:28px 28px 0 0;padding:20px 20px calc(22px + env(safe-area-inset-bottom));
  max-height:88%;overflow-y:auto;animation:fadeUp .3s ease;
}
.sheet.modal{border-radius:26px;margin:0 16px;max-height:86%;}
.sheet h3{font-size:18px;}
.sheet-handle{width:42px;height:5px;background:#EAD3DA;border-radius:3px;margin:0 auto 14px;}

/* ============ 通知（微信式顶部弹出）============ */
#toast-stack{position:absolute;top:0;left:0;right:0;z-index:80;padding:8px 12px;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{
  background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
  padding:12px 14px;display:flex;gap:10px;align-items:flex-start;
  animation:fadeDown .35s ease both;pointer-events:auto;
}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}
.toast .t-ic{font-size:20px;}
.toast .t-body{flex:1;font-size:13.5px;}
.toast .t-title{font-weight:700;font-size:14px;margin-bottom:1px;}

/* ============ 加载小花瓣 ============ */
#loader{position:absolute;inset:0;z-index:90;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;}
#loader.show{display:flex;}
.petals{position:relative;width:120px;height:120px;}
.petals span{position:absolute;left:50%;top:-8px;font-size:18px;animation:petal 2.4s linear infinite;}
.loader-flower{font-size:40px;animation:spinPetal 3s linear infinite;}

/* ============ 聊天 ============ */
.chat-head{position:sticky;top:0;z-index:5;background:rgba(255,245,247,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.chat-back{font-size:22px;cursor:pointer;color:var(--rose);}
.goal-banner{background:linear-gradient(135deg,#FCEFE3,#FBE7EC);border:1px solid var(--line);border-radius:14px;padding:10px 14px;margin:10px 14px;font-size:13.5px;}
.msgs{flex:1;overflow-y:auto;padding:8px 14px 12px;display:flex;flex-direction:column;gap:10px;}
.msg{max-width:76%;padding:10px 14px;border-radius:18px;font-size:14.5px;line-height:1.5;}
.msg.fresh{animation:fadeUp .28s ease both;}
.msg.me{align-self:flex-end;background:linear-gradient(135deg,var(--rose),#EF9DB0);color:#fff;border-bottom-right-radius:6px;}
.msg.you{align-self:flex-start;background:#fff;border:1px solid var(--line);border-bottom-left-radius:6px;}
.msg.sys{align-self:center;background:#F3E9F5;color:#8C5BA3;font-size:12.5px;border-radius:14px;text-align:center;max-width:88%;}
.msg .mtag{font-size:11px;opacity:.7;display:block;margin-bottom:2px;}
.chat-input{display:flex;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:#fff;align-items:flex-end;}
.chat-input textarea{min-height:42px;max-height:90px;border-radius:20px;padding:10px 14px;}
.chat-tools{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px 0;}
.chip{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:6px 11px;font-size:12.5px;cursor:pointer;}
.chip:active{transform:scale(.95);}

/* ============ 列表项 ============ */
.list-item{display:flex;gap:12px;align-items:center;background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s;}
.list-item:active{transform:scale(.985);}
.avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--rose-soft),var(--lav));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.li-main{flex:1;min-width:0;}
.li-title{font-weight:700;font-size:15px;}
.li-sub{font-size:12.5px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rel-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px;background:#F0E6F5;color:#8C5BA3;}

/* ============ 帖子（派对屋）============ */
.post{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:16px;margin:10px 4px;box-shadow:var(--shadow-sm);}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-img{width:100%;border-radius:14px;margin:8px 0;display:block;}
.post-actions{display:flex;gap:18px;margin-top:10px;font-size:13.5px;color:var(--ink-soft);}
.post-actions span{cursor:pointer;}
.post-actions span.on{color:var(--rose);font-weight:600;}
.comment{font-size:13px;background:#FBF1F4;border-radius:12px;padding:8px 11px;margin-top:6px;}

/* ============ 她意识 ============ */
.story{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:18px;margin:12px 4px;box-shadow:var(--shadow-sm);}
.story-meta{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}
.story-body{font-size:15px;line-height:1.75;white-space:pre-wrap;}
.story-touch{margin-top:12px;display:flex;align-items:center;gap:6px;color:var(--ink-soft);font-size:13px;cursor:pointer;}

/* ============ 个人主页 ============ */
.profile-bg{height:130px;background:linear-gradient(135deg,var(--lav),var(--rose-soft),var(--apri));position:relative;}
.profile-card{margin:-46px 16px 0;background:#fff;border:1.5px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);text-align:center;position:relative;}
.profile-card .avatar{width:78px;height:78px;font-size:38px;margin:-58px auto 8px;border:4px solid #fff;}
.temp-pill{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FBE0E0,#FCEFE0);color:#C76;padding:8px 16px;border-radius:18px;font-weight:700;margin-top:8px;}
.stat-row{display:flex;gap:10px;margin:14px 0;}
.stat{flex:1;background:#FBF1F4;border-radius:14px;padding:12px;text-align:center;}
.stat b{font-size:18px;display:block;color:var(--rose);}
.stat small{font-size:11px;color:var(--ink-soft);}
.menu-item{display:flex;justify-content:space-between;align-items:center;background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:15px;margin:10px 16px;cursor:pointer;font-weight:600;font-size:15px;}
.menu-item:active{background:#FBF1F4;}

/* tutorial */
#tutorial{position:absolute;inset:0;z-index:70;background:rgba(61,43,53,.5);display:none;align-items:flex-end;}
#tutorial.show{display:flex;}
.tut-bubble{background:#fff;border-radius:24px;margin:0 18px 90px;padding:20px;box-shadow:var(--shadow);width:100%;max-width:444px;animation:fadeUp .35s ease;}
.tut-step{font-size:12px;color:var(--rose);font-weight:700;margin-bottom:6px;}
.tut-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}

.tut-highlight{position:relative;z-index:71;box-shadow:0 0 0 4px var(--rose),0 0 0 9px rgba(232,130,154,.3);border-radius:14px;}

.emoji-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.emoji-grid .bubble{text-align:center;font-size:20px;padding:10px 0;}
.preset-lines{display:flex;flex-direction:column;gap:8px;}
.preset-lines .bubble{text-align:left;}
.empty{text-align:center;color:var(--ink-soft);padding:40px 20px;font-size:14px;}
.section-title{font-size:13px;font-weight:700;color:var(--ink-soft);margin:14px 0 6px;}
hr.soft{border:none;border-top:1px dashed var(--line);margin:16px 0;}

/* ===== 关系小屋 ===== */
.rm-hero{border-radius:24px;padding:22px 18px;text-align:center;color:#7a4b5c;position:relative;overflow:hidden;box-shadow:var(--shadow);margin-bottom:6px;}
.rm-hero .avatar{width:74px;height:74px;font-size:36px;margin:0 auto 8px;border:4px solid rgba(255,255,255,.7);}
.rm-hero .rel-big{display:inline-block;background:rgba(255,255,255,.7);padding:5px 14px;border-radius:16px;font-weight:700;font-size:13px;margin-top:6px;}
.func-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.func-card{background:#fff;border:1.5px solid var(--line);border-radius:20px;padding:16px 12px;text-align:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .14s,box-shadow .2s;}
.func-card:active{transform:scale(.95);}
.func-card .fc-ic{font-size:30px;display:block;margin-bottom:6px;animation:float 4s ease-in-out infinite;}
.func-card .fc-t{font-weight:700;font-size:14px;}
.func-card .fc-d{font-size:11px;color:var(--ink-soft);margin-top:2px;}
.func-card.wide{grid-column:span 2;display:flex;align-items:center;gap:12px;text-align:left;padding:14px 16px;}
.func-card.wide .fc-ic{margin:0;font-size:26px;}
.badge-dot{position:absolute;top:10px;right:12px;background:var(--rose);color:#fff;font-size:10px;font-weight:700;border-radius:9px;padding:1px 6px;}
.rm-goal{background:linear-gradient(135deg,#FCEFE3,#FBE7EC);border-radius:18px;padding:14px 16px;margin:6px 0 4px;font-size:14px;}

/* ===== 管理员控制台 ===== */
.adm-card{background:#2C2433;border:1px solid #4A3D54;border-radius:16px;padding:14px;margin:10px 0;}
.adm-card h4{margin:0 0 8px;font-size:14px;color:#F6C9D4;}
.adm-stat{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.adm-stat div{background:#3A3043;border-radius:12px;padding:10px;text-align:center;}
.adm-stat b{display:block;font-size:18px;color:#F2C4A0;}
.adm-stat small{font-size:10px;color:#B9A7C8;}
.adm-tabs{display:flex;gap:6px;margin:6px 0 12px;flex-wrap:wrap;}
.adm-tab{background:#3A3043;color:#C9A8D4;padding:7px 13px;border-radius:14px;font-size:13px;cursor:pointer;font-weight:600;}
.adm-tab.on{background:var(--rose);color:#fff;}
.adm-row{background:#332A3B;border-radius:12px;padding:10px 12px;margin:8px 0;font-size:13px;}
.adm-row .meta{font-size:11px;color:#9C8AAC;margin-bottom:4px;}
.adm-row.hidden-row{opacity:.5;}
.adm-btn{background:#4A3D54;color:#EADFF0;border:none;border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;margin-right:6px;margin-top:6px;}
.adm-btn.danger{background:#7a3b48;}
.adm-btn.ok{background:#3b6b4a;}
.log-line{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#F6A9A9;background:#2A222F;border-radius:8px;padding:6px 8px;margin:5px 0;white-space:pre-wrap;word-break:break-word;}
.log-line.info{color:#9FD3B0;}
.gate{max-width:320px;margin:60px auto 0;text-align:center;}
@media (prefers-reduced-motion: reduce){
  .screen.active,.msg.fresh,.qcard,.card,.func-card .fc-ic,.badge{animation:none !important;}
}
</style>
</head>
<body>
<div id="app">

  <!-- 通知栈 -->
  <div id="toast-stack"></div>

  <!-- 加载动画 -->
  <div id="loader">
    <div class="petals" id="petals"></div>
    <div class="loader-flower">🌸</div>
    <p class="muted" id="loaderText" style="margin-top:14px;">温柔加载中…</p>
  </div>

  <!-- 1. 欢迎页 -->
  <section id="welcome" class="screen active">
    <div class="welcome-lines" id="welcomeLines">
      <p class="l0">Hey女孩！喜欢妳来🥰</p>
      <p>她触是一个全心投入女女链接，致力于女性彼此触碰、点亮的平台</p>
      <p>我们希望同妳一起探索，妳生命的温度可以如何温暖她人和自己</p>
    </div>
    <div class="badge-wrap" id="badgeWrap">
      <div class="badge" id="badge"></div>
      <button class="btn" style="margin-top:24px;font-size:18px;" onclick="go('register')">I'm in ✨</button>
      <a class="link" style="margin-top:14px;" onclick="welcomeExit()">我再想想</a>
    </div>
  </section>

  <!-- 2. 注册页 -->
  <section id="register" class="screen">
    <div class="wrap">
      <h1>创建妳的账号 🌷</h1>
      <p class="muted">用手机号注册，开启妳的她触之旅</p>
      <label>手机号</label>
      <input id="regPhone" type="tel" inputmode="numeric" placeholder="请输入手机号" maxlength="11">
      <label>设置密码</label>
      <input id="regPwd" type="password" placeholder="至少6位">
      <label>确认密码</label>
      <input id="regPwd2" type="password" placeholder="再次输入密码">
      <div class="field-hint" id="regHint"></div>
      <button class="btn block" style="margin-top:24px;" onclick="doRegister()">注册并继续 →</button>
      <p class="center" style="margin-top:16px;"><a class="link" onclick="go('login')">已有账号？登录 →</a></p>
      <p class="center" style="margin-top:6px;"><a class="link" onclick="doLoginDemo()">先用演示账号逛逛</a></p>
    </div>
  </section>

  <!-- 2b. 登录页 -->
  <section id="login" class="screen">
    <div class="wrap">
      <h1>欢迎回来 🌷</h1>
      <p class="muted">用妳注册时的手机号和密码登录，数据会自动同步</p>
      <label>手机号</label>
      <input id="loginPhone" type="tel" inputmode="numeric" placeholder="请输入手机号" maxlength="11">
      <label>密码</label>
      <input id="loginPwd" type="password" placeholder="请输入密码">
      <div class="field-hint" id="loginHint"></div>
      <button class="btn block" style="margin-top:24px;" onclick="doLogin()">登录 →</button>
      <p class="center" style="margin-top:16px;"><a class="link" onclick="go('register')">还没有账号？去注册</a></p>
    </div>
  </section>

  <!-- 3. 个人档案 -->
  <section id="profile" class="screen">
    <div class="topbar">
      <h2 id="profTitle">完善档案</h2>
      <a class="link" id="profSkipLayer" style="display:none;" onclick="skipOptional()">暂时跳过</a>
    </div>
    <div class="wrap">
      <div class="progress"><i id="profBar" style="width:0%"></i></div>
      <div id="profStep"></div>
      <div style="display:flex;gap:10px;margin-top:24px;">
        <button class="btn ghost" id="profBack" style="display:none;flex:0 0 auto;" onclick="profPrev()">←</button>
        <button class="btn block" id="profNext" onclick="profNext()">下一步</button>
      </div>
    </div>
  </section>

  <!-- 主壳：首页 / 触碰 / 她意识 / 我的 -->
  <section id="home" class="screen">
    <div class="topbar">
      <div class="tabs" style="flex:1;">
        <div class="tab on" id="tabWorry" onclick="switchHomeTab('worry')">💭 烦恼屋</div>
        <div class="tab" id="tabParty" onclick="switchHomeTab('party')">🎉 派对屋</div>
      </div>
    </div>
    <div class="wrap has-tabbar" id="homeBody"></div>
  </section>

  <section id="touch" class="screen">
    <div class="topbar"><h2>💬 触碰</h2></div>
    <div class="wrap has-tabbar" id="touchBody"></div>
  </section>

  <section id="aware" class="screen">
    <div class="topbar"><h2>✨ 她意识</h2></div>
    <div class="wrap has-tabbar" id="awareBody"></div>
  </section>

  <section id="me" class="screen">
    <div id="meBody" class="has-tabbar"></div>
  </section>

  <!-- 聊天界面 -->
  <section id="chat" class="screen">
    <div class="chat-head">
      <span class="chat-back" onclick="backFromChat()">‹</span>
      <div class="avatar" id="chatAvatar" style="width:38px;height:38px;font-size:18px;"></div>
      <div style="flex:1;min-width:0;">
        <div class="li-title" id="chatName"></div>
        <div class="li-sub" id="chatRel"></div>
      </div>
      <span style="cursor:pointer;" onclick="openRelMenu()">⚙️</span>
    </div>
    <div id="chatGoal"></div>
    <div id="chatExtra" class="chat-tools"></div>
    <div class="msgs" id="chatMsgs"></div>
    <div class="chat-input">
      <textarea id="chatText" rows="1" placeholder="说点什么…"></textarea>
      <button class="btn sm" onclick="sendChat()">发送</button>
    </div>
  </section>

  <!-- 关系小屋（深度链接管理 + 特殊功能） -->
  <section id="relmgmt" class="screen">
    <div class="chat-head">
      <span class="chat-back" onclick="navTo('touch')">‹</span>
      <div style="flex:1;min-width:0;"><div class="li-title">关系小屋 🏡</div><div class="li-sub" id="rmSub"></div></div>
    </div>
    <div class="wrap" id="rmBody"></div>
  </section>

  <!-- 开发者 / 管理员视角 -->
  <section id="admin" class="screen">
    <div class="chat-head" style="background:#2E2530;">
      <span class="chat-back" style="color:#F6C9D4;" onclick="exitAdmin()">‹</span>
      <div style="flex:1;"><div class="li-title" style="color:#fff;">🛠️ 开发者控制台</div><div class="li-sub" style="color:#C9A8D4;">她触 Touched · Admin</div></div>
    </div>
    <div class="wrap" id="adminBody" style="background:#211B25;min-height:100%;color:#EADFF0;"></div>
  </section>

  <!-- 底部导航 -->
  <nav id="tabbar">
    <div class="nav-item on" data-screen="home" onclick="navTo('home')"><span class="ic">🏠</span>首页</div>
    <div class="nav-item" data-screen="touch" onclick="navTo('touch')"><span class="ic">💬</span>触碰</div>
    <div class="nav-item" data-screen="aware" onclick="navTo('aware')"><span class="ic">✨</span>她意识</div>
    <div class="nav-item" data-screen="me" onclick="navTo('me')"><span class="ic">👤</span>我的</div>
  </nav>

  <!-- Tutorial -->
  <div id="tutorial"><div class="tut-bubble" id="tutBubble"></div></div>

  <!-- 通用底部面板 -->
  <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>

  if(raw){ try{ DB = JSON.parse(raw); }catch(e){ DB=null; } }
  if(!DB){ DB = seedDB(); saveDB(); }
}
function resetDB(){ localStorage.removeItem(DB_KEY); localStorage.removeItem("touched_session"); location.reload(); }

/* =========================================================
   ☁️ 云同步层（Supabase · 共享真实社区）
   - 没有有效配置 → CLOUD.enabled=false，全程本地运行
   - 有配置 → onSnapshot 实时把云端数据灌入 DB（读），
     关键写操作通过 CW()/CWuser() 同步到云端（写）
   ========================================================= */
const CLOUD = { enabled:false, sb:null, ready:false, started:false, authBusy:false };

function cloudConfigured(){
  return SUPABASE_URL && SUPABASE_ANON_KEY && !/^PASTE/.test(SUPABASE_URL) && !/^PASTE/.test(SUPABASE_ANON_KEY);
}
function cloudInit(){
  if(!cloudConfigured()) return false;
  if(typeof supabase==="undefined" || !supabase.createClient){ logEvent("error","Supabase SDK 未加载（检查网络/CDN）"); return false; }
  try{
    CLOUD.sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    CLOUD.enabled = true;
    logEvent("info","云端已连接：Supabase");
    return true;
  }catch(e){ logEvent("error","cloud init: "+e.message); CLOUD.enabled=false; return false; }
}
/* 手机号 → 伪邮箱（用 邮箱+密码 认证承载，无需短信/真实邮箱） */
function phoneToEmail(phone){ return phone+"@touched.app"; }
function plain(o){ return JSON.parse(JSON.stringify(o)); }
/* 对象 → 数据表行：id + 用于查询/隐私的列 + data(jsonb) */
function rowFor(coll, obj){
  const row={ id:obj.id, data:plain(obj) };
  if(coll==="questions"||coll==="posts"||coll==="stories"){ row.author_id=obj.authorId||null; row.created_at=obj.createdAt||now(); }
  if(coll==="relationships"){ row.members=obj.members||[]; }
  return row;
}
/* 写一行（按 id upsert） */
function CW(coll, obj){
  if(!CLOUD.enabled || !obj || !obj.id) return;
  CLOUD.sb.from(coll).upsert(rowFor(coll,obj)).then(r=>{ if(r.error) logEvent("error","CW "+coll+": "+r.error.message); });
}
/* 写用户：剥离私密数据（日记/密码绝不进公开档案） */
function CWuser(u){
  if(!CLOUD.enabled || !u || !u.id) return;
  const pub=plain(u); delete pub.diaries; delete pub.pwd;
  CLOUD.sb.from("users").upsert({id:u.id, data:pub}).then(r=>{ if(r.error) logEvent("error","CWuser: "+r.error.message); });
}
/* 私密数据（只有本人可读写，存 private 表，id=自己uid） */
function CWprivate(patch){
  if(!CLOUD.enabled || !DB.currentUserId) return;
  DB.private=Object.assign({}, DB.private||{}, patch);
  CLOUD.sb.from("private").upsert({id:DB.currentUserId, data:plain(DB.private)}).then(r=>{ if(r.error) logEvent("error","CWprivate: "+r.error.message); });
}
function CWdel(coll, id){
  if(!CLOUD.enabled) return;
  CLOUD.sb.from(coll).delete().eq("id",id).then(r=>{ if(r.error) logEvent("error","CWdel "+coll+": "+r.error.message); });
}
function CWmeta(){}   // 管理员口令仅存本地，不上云
/* 用户缓存：按需懒加载她人公开档案（不全量订阅，省读取、可扩展到上百人） */
const _userFetching={};
function upsertUser(u){ if(!u||!u.id) return; const i=DB.users.findIndex(x=>x.id===u.id); if(i>=0) DB.users[i]={...DB.users[i],...u}; else DB.users.push(u); }
function ensureUserLoaded(id){
  if(!CLOUD.enabled || !id) return;
  if(userById(id) || _userFetching[id]) return;
  _userFetching[id]=true;
  CLOUD.sb.from("users").select("data").eq("id",id).maybeSingle().then(r=>{
    _userFetching[id]=false;
    if(r.data && r.data.data){ upsertUser(r.data.data); try{saveDB();}catch(e){} rerenderCurrent(); }
  });
}
function prefetchAuthors(arr){ const seen={}; (arr||[]).forEach(o=>{ const a=o.authorId; if(a&&!seen[a]){ seen[a]=1; ensureUserLoaded(a); } }); }
async function cloudMaybeSeed(){}   // 演示数据通过 SQL 脚本一次性写入，客户端不再 seed

/* 拉取各表（RLS 自动限制可见范围：关系/私聊只能看到自己的） */
function _rows(r){ return (r.data||[]).map(x=>x.data).filter(Boolean); }
async function fetchQuestions(){ const r=await CLOUD.sb.from("questions").select("data").order("created_at",{ascending:false}).limit(60); if(r.error){logEvent("error","questions: "+r.error.message);return;} DB.questions=_rows(r); prefetchAuthors(DB.questions); CLOUD.ready=true; try{saveDB();}catch(e){} if(currentScreen==="home")renderHome(); }
async function fetchPosts(){ const r=await CLOUD.sb.from("posts").select("data").order("created_at",{ascending:false}).limit(40); if(r.error){logEvent("error","posts: "+r.error.message);return;} DB.posts=_rows(r); prefetchAuthors(DB.posts); try{saveDB();}catch(e){} if(currentScreen==="home")renderHome(); }
async function fetchStories(){ const r=await CLOUD.sb.from("stories").select("data").order("created_at",{ascending:false}).limit(60); if(r.error){logEvent("error","stories: "+r.error.message);return;} DB.stories=_rows(r); try{saveDB();}catch(e){} if(currentScreen==="aware")renderAware(); }
async function fetchRelationships(){ const uid=DB.currentUserId; const r=await CLOUD.sb.from("relationships").select("data"); if(r.error){logEvent("error","relationships: "+r.error.message);return;} DB.relationships=_rows(r); DB.chats=DB.chats||{}; DB.relationships.forEach(rel=>{ DB.chats[rel.id]=rel.msgs||[]; ensureUserLoaded(rel.aId===uid?rel.bId:rel.aId); }); try{saveDB();}catch(e){} rerenderCurrent(); }
async function fetchMe(){ const uid=DB.currentUserId; const r=await CLOUD.sb.from("users").select("data").eq("id",uid).maybeSingle(); if(r.data&&r.data.data){ upsertUser(r.data.data); try{saveDB();}catch(e){} rerenderCurrent(); } }
async function fetchPrivate(){ const uid=DB.currentUserId; const r=await CLOUD.sb.from("private").select("data").eq("id",uid).maybeSingle(); DB.private=(r.data&&r.data.data)||{}; }

/* 启动：首次拉取 + 实时订阅（任意改动→重新拉取对应表，RLS 自动过滤可见范围） */
function cloudStart(){
  if(!CLOUD.enabled || CLOUD.started || !DB.currentUserId) return;
  CLOUD.started = true;
  DB.chats=DB.chats||{};
  fetchMe(); fetchPrivate(); fetchQuestions(); fetchPosts(); fetchStories(); fetchRelationships();
  try{
    CLOUD.sb.channel("touched-rt")
      .on("postgres_changes",{event:"*",schema:"public",table:"questions"}, ()=>fetchQuestions())
      .on("postgres_changes",{event:"*",schema:"public",table:"posts"}, ()=>fetchPosts())
      .on("postgres_changes",{event:"*",schema:"public",table:"stories"}, ()=>fetchStories())
      .on("postgres_changes",{event:"*",schema:"public",table:"relationships"}, ()=>fetchRelationships())
      .subscribe();
  }catch(e){ logEvent("error","realtime: "+e.message); }
}
function rerenderCurrent(){
  try{
    if(currentScreen==="home") renderHome();
    else if(currentScreen==="touch") renderTouch();
    else if(currentScreen==="aware") renderAware();
    else if(currentScreen==="me") renderMe();
    else if(currentScreen==="chat" && activeRel) renderMsgs();
    else if(currentScreen==="relmgmt" && activeRel) renderRelManage();
    else if(currentScreen==="admin" && adminUnlocked) renderAdmin();
  }catch(e){ logEvent("error","rerender: "+e.message); }
}
/* 简单口令哈希（内测用，非银行级安全；勿用真实重要密码） */
function hashPwd(s){ let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h)+s.charCodeAt(i); h=h&0xffffffff; } return "h"+(h>>>0).toString(16); }
/* 会话持久化（跨刷新保持登录） */
function setSession(id){ try{ localStorage.setItem("touched_session", id||""); }catch(e){} }
function getSession(){ try{ return localStorage.getItem("touched_session")||""; }catch(e){ return ""; } }
const uid = (p)=> (p||"id")+"_"+Math.random().toString(36).slice(2,8);
const now = ()=> Date.now();
function daysSince(t){ return Math.max(0, Math.floor((now()-t)/86400000)); }
function timeAgo(t){
  const s=Math.floor((now()-t)/1000);
  if(s<60) return "刚刚";
  if(s<3600) return Math.floor(s/60)+"分钟前";
  if(s<86400) return Math.floor(s/3600)+"小时前";
  return Math.floor(s/86400)+"天前";
}

/* ---------- 当前用户 ---------- */
function me(){ return DB.users.find(u=>u.id===DB.currentUserId); }
function userById(id){ return DB.users.find(u=>u.id===id); }

/* ---------- 屏幕导航 ---------- */
let currentScreen = "welcome";
function go(id){
  const el = document.getElementById(id);
  if(currentScreen!==id){   // 只在真正切换屏幕时播放入场动画，避免同屏重复触发造成闪烁
    document.querySelectorAll(".screen.active").forEach(s=>s.classList.remove("active"));
    el.classList.add("active");
  }
  el.scrollTop = 0;
  currentScreen = id;
  const showTab = ["home","touch","aware","me"].includes(id);
  document.getElementById("tabbar").classList.toggle("show", showTab);
  if(showTab){
    document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("on", n.dataset.screen===id));
  }
}
function navTo(id){
  go(id);
  if(id==="home") renderHome();
  if(id==="touch") renderTouch();
  if(id==="aware") renderAware();
  if(id==="me") renderMe();
}

/* ---------- 通知（微信式顶部弹出）---------- */
function toast(title, body, icon){
  const stack = document.getElementById("toast-stack");
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = `<div class="t-ic">${icon||"🔔"}</div><div class="t-body"><div class="t-title">${title}</div>${body||""}</div>`;
  stack.appendChild(el);
  setTimeout(()=>{ el.style.transition="opacity .4s,transform .4s"; el.style.opacity="0"; el.style.transform="translateY(-10px)"; setTimeout(()=>el.remove(),400); }, 3600);
}

/* ---------- 温度值 ---------- */
function weekKey(){ const d=new Date(); const onejan=new Date(d.getFullYear(),0,1); const wk=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7); return d.getFullYear()+"-"+wk; }
function addTemp(amount, reason){
  const u = me(); if(!u) return;
  if(!u.tempWeek || u.tempWeek!==weekKey()){ u.tempWeek=weekKey(); u.temp=0; }
  u.temp = (u.temp||0) + amount;
  saveDB(); CWuser(u);
  toast("温度 +"+amount+"🌡️", reason||"", "🌡️");
}
function myTemp(){ const u=me(); if(!u) return 0; if(u.tempWeek!==weekKey()) return 0; return u.temp||0; }

/* ========== 2. 注册 ========== */
async function doRegister(){
  const phone=document.getElementById("regPhone").value.trim();
  const p1=document.getElementById("regPwd").value, p2=document.getElementById("regPwd2").value;
  const hint=document.getElementById("regHint");
  hint.style.color="#D2615E";
  if(!/^\d{6,11}$/.test(phone)){ hint.textContent="请输入有效的手机号"; return; }
  if(p1.length<6){ hint.textContent="密码至少6位"; return; }
  if(p1!==p2){ hint.textContent="两次密码不一致"; return; }
  const newUserBase={ nick:"", age:24, country:"中国", region:"",
    emoji:"🌸", status:"", phase:"", needs:[], purpose:"", time:"", hobbies:[], mbti:"",
    skills:[], traits:[], exp:[], sign:"", temp:0, tempWeek:weekKey(), isNew:true, createdAt:now() };
  if(CLOUD.enabled){
    // 真实身份验证：Supabase 邮箱+密码（手机号→伪邮箱），密码由 Supabase 安全保管，我们不存
    CLOUD.authBusy=true;
    const {data,error}=await CLOUD.sb.auth.signUp({ email:phoneToEmail(phone), password:p1 });
    if(error){
      CLOUD.authBusy=false;
      hint.textContent = /already registered|already been/i.test(error.message) ? "这个手机号已注册过啦，去登录吧～"
        : /Password/i.test(error.message) ? "密码太简单，至少6位且复杂一点" : ("注册失败："+error.message);
      logEvent("error","register: "+error.message); return;
    }
    if(!data.user){ CLOUD.authBusy=false; hint.textContent="注册异常，请重试"; return; }
    const uid=data.user.id;
    const newUser={ id:uid, phone, ...newUserBase };

function renderProfStep(){
  const s=PROF_STEPS[profStepIdx];
  const total=PROF_STEPS.length;
  document.getElementById("profBar").style.width=((profStepIdx)/total*100)+"%";
  const layerName={1:"第一层 · 基础信息",2:"第二层 · 核心匹配",3:"第三层 · 选填（越详细匹配越准确💫）"}[s.layer];
  document.getElementById("profTitle").textContent=layerName;
  document.getElementById("profSkipLayer").style.display = s.optional?"block":"none";
  document.getElementById("profBack").style.display = profStepIdx>0?"block":"none";
  const box=document.getElementById("profStep");
  let html=`<div class="card" style="animation:fadeUp .4s ease both;"><div style="font-size:34px;text-align:center;margin-bottom:6px;">${s.emoji}</div><h2 class="center">${s.q}</h2>`;
  if(s.optional) html+=`<p class="center field-hint">选填 · 越详细匹配越准确 💫</p>`;
  html+="<div style='margin-top:14px;'>";
  if(s.type==="text"){
    html+=`<input id="pf_input" placeholder="${s.ph}" value="${profDraft[s.key]||""}">`;
  } else if(s.type==="age"){
    html+=`<div class="center" style="font-size:40px;font-weight:700;color:var(--rose);" id="ageShow">${profDraft.age}</div>
      <input type="range" min="14" max="70" value="${profDraft.age}" id="pf_age" oninput="document.getElementById('ageShow').textContent=this.value" style="padding:0;border:none;box-shadow:none;">`;
  } else if(s.type==="loc"){
    html+=`<label>国家</label><select id="pf_country" onchange="onCountryChange()">${Object.keys(COUNTRIES).map(c=>`<option ${c===profDraft.country?"selected":""}>${c}</option>`).join("")}</select>
      <label>地区/省份</label><select id="pf_region">${COUNTRIES[profDraft.country||"中国"].map(r=>`<option ${r===profDraft.region?"selected":""}>${r}</option>`).join("")}</select>`;
  } else if(s.type==="select"){
    html+=`<select id="pf_select"><option value="">请选择</option>${s.opts.map(o=>`<option ${o===profDraft[s.key]?"selected":""}>${o}</option>`).join("")}</select>`;
  } else if(s.type==="single"||s.type==="multi"){
    const cur=profDraft[s.key];
    html+=`<div class="bubbles" id="pf_bubbles">`;
    s.opts.forEach(o=>{
      const on = s.type==="single" ? cur===o : Array.isArray(cur)&&cur.includes(o);
      const cls = "bubble "+(s.style||"")+(on?" on":"");
      html+=`<span class="${cls}" onclick="toggleProfBubble(this,'${s.key}','${s.type}','${o.replace(/'/g,"\\'")}')">${o}</span>`;
    });
    html+=`</div>`;
    if(s.custom) html+=`<div style="display:flex;gap:8px;margin-top:10px;"><input id="pf_custom" placeholder="自定义填写…" style="flex:1;"><button class="btn sm" onclick="addCustom('${s.key}','${s.style||""}')">添加</button></div>`;
  }
  html+="</div></div>";
  box.innerHTML=html;
  updateProfNext();
}
function onCountryChange(){
  const c=document.getElementById("pf_country").value;
  profDraft.country=c;
  document.getElementById("pf_region").innerHTML=COUNTRIES[c].map(r=>`<option>${r}</option>`).join("");
}
function toggleProfBubble(el,key,type,val){
  if(type==="single"){
    document.querySelectorAll("#pf_bubbles .bubble").forEach(b=>b.classList.remove("on"));
    el.classList.add("on"); profDraft[key]=val;
  } else {
    if(!Array.isArray(profDraft[key])) profDraft[key]=[];
    const i=profDraft[key].indexOf(val);
    if(i>=0){ profDraft[key].splice(i,1); el.classList.remove("on"); }
    else { profDraft[key].push(val); el.classList.add("on"); }
  }
  updateProfNext();
}
function addCustom(key,style){
  const inp=document.getElementById("pf_custom"); const v=inp.value.trim();
  if(!v) return;
  if(!Array.isArray(profDraft[key])) profDraft[key]=[];
  if(!profDraft[key].includes(v)) profDraft[key].push(v);
  const box=document.getElementById("pf_bubbles");
  const sp=document.createElement("span"); sp.className="bubble "+(style||"")+" on";
  sp.textContent=v; sp.onclick=function(){ toggleProfBubble(sp,key,"multi",v); };
  box.appendChild(sp); inp.value=""; updateProfNext();
}
function syncCurrentStep(){
  const s=PROF_STEPS[profStepIdx];
  if(s.type==="text"){ profDraft[s.key]=document.getElementById("pf_input").value.trim(); }
  else if(s.type==="age"){ profDraft.age=+document.getElementById("pf_age").value; }
  else if(s.type==="loc"){ profDraft.country=document.getElementById("pf_country").value; profDraft.region=document.getElementById("pf_region").value; }
  else if(s.type==="select"){ profDraft[s.key]=document.getElementById("pf_select").value; }
}
function stepValid(){
  const s=PROF_STEPS[profStepIdx];
  if(s.optional) return true;
  if(s.type==="text"){ return (document.getElementById("pf_input")?.value.trim()||"").length>0; }
  if(s.type==="loc"){ return true; }
  if(s.type==="select"){ return !!document.getElementById("pf_select")?.value; }
  if(s.type==="single"){ return !!profDraft[s.key]; }
  if(s.type==="multi"){ return Array.isArray(profDraft[s.key]) && profDraft[s.key].length>0; }
  return true;
}
function updateProfNext(){
  const btn=document.getElementById("profNext");
  btn.disabled=!stepValid();
  btn.textContent = profStepIdx===PROF_STEPS.length-1 ? "完成档案 🌸" : "下一步";
}
document.addEventListener("input",e=>{ if(e.target.id==="pf_input") updateProfNext(); });
function profPrev(){ if(profStepIdx>0){ syncCurrentStep(); profStepIdx--; renderProfStep(); } }
function skipOptional(){ profNext(true); }
function profNext(skip){
  if(!skip){ syncCurrentStep(); if(!stepValid()){ updateProfNext(); return; } }
  if(profStepIdx<PROF_STEPS.length-1){ profStepIdx++; renderProfStep(); }
  else { finishProfile(); }
}
function finishProfile(){
  const u=me();
  Object.assign(u, profDraft);
  if(!u.nick) u.nick="匿名小花";
  u.emoji = ["🌷","🌸","🌹","🌻","🌼","🪷","🐰","🌙","🍃"][Math.floor(Math.random()*9)];
  u.isNew=true; saveDB(); CWuser(u);
  showLoader("正在为妳点亮她触…", ()=>{
    go("home"); renderHome();
    if(!DB.tutorialDone) startTutorial();
  });
}

/* ---- 真实图片：从相册选择 → 浏览器内压缩 → 存为 data URL ---- */
function pickImage(maxDim, maxChars, cb){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept="image/*";
  inp.onchange=()=>{
    const f=inp.files&&inp.files[0]; if(!f) return;
    if(!/^image\//.test(f.type)){ toast("请选择图片文件 🌸","",""); return; }
    const r=new FileReader();
    r.onload=()=>compressDataURL(r.result, maxDim, maxChars, cb);
    r.onerror=()=>toast("读取失败 🌸","换一张试试","");
    r.readAsDataURL(f);
  };
  inp.click();
}
function compressDataURL(dataURL, maxDim, maxChars, cb){
  const img=new Image();
  img.onload=()=>{
    let w=img.width, h=img.height;
    if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
    else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
    const c=document.createElement("canvas"); c.width=w; c.height=h;
    const ctx=c.getContext("2d"); ctx.drawImage(img,0,0,w,h);
    let q=0.82, out=c.toDataURL("image/jpeg",q);
    while(out.length>maxChars && q>0.32){ q-=0.1; out=c.toDataURL("image/jpeg",q); }
    if(out.length>maxChars){ toast("这张图太大啦 🌸","换一张小一点的试试",""); return; }
    cb(out);
  };
  img.onerror=()=>toast("图片解析失败 🌸","换一张试试","");
  img.src=dataURL;
}

/* ========== 8. 智能匹配引擎 ========== */
function matchScore(q, candidate){
  // 给“当前用户作为回应者”看烦恼屋时用：candidate默认当前用户
  const u = candidate || me();
  const a = userById(q.authorId);
  if(!u||!a) return 0;
  let s=0;
  // 领域/需求契合：发问领域 vs 我的擅长领域
  const domainNeedMap={职业:"职场晋升",情感:"情感陪伴",心理:"心理支持",学业:"语言学习",创业:"创业经验",人际:"情感陪伴",兴趣:"教育经验"};
  if(u.skills && u.skills.includes(domainNeedMap[q.domain])) s+=25;
  // 相似经历
  if(a.exp && u.exp){ const common=a.exp.filter(x=>u.exp.includes(x)).length; s+=common*10; }
  // 处境契合
  if(a.phase===u.phase) s+=6;
  // MBTI 兼容（同首字母或互补N/F）
  if(a.mbti && u.mbti){ if(a.mbti[0]!==u.mbti[0]) s+=4; if(a.mbti.includes("F")&&u.mbti.includes("F")) s+=4; }
  // 地理距离
  if(a.region && u.region && a.region===u.region) s+=8;
  else if(a.country===u.country) s+=3;
  // 共同爱好
  if(a.hobbies&&u.hobbies){ s+= a.hobbies.filter(x=>u.hobbies.includes(x)).length*3; }
  // 优先级加权（权重最高）
  (q.priority||[]).forEach(p=>{
    if(p==="距离近优先" && a.region===u.region) s+=30;
    if(p==="专业背景优先" && u.skills.includes(domainNeedMap[q.domain])) s+=30;
    if(p==="相似经历优先" && a.exp.filter(x=>u.exp.includes(x)).length>0) s+=30;
    if(p==="沟通舒适优先" && a.mbti&&u.mbti && (a.mbti.includes("F")===u.mbti.includes("F"))) s+=20;
    if(p==="快速响应优先" && (u.time==="较多时间"||u.time==="每周固定")) s+=20;
  });
  return s;
}
function runMatch(q){
  // 在虚拟用户中找最佳回应者（排除自己）
  const cands=DB.users.filter(u=>u.id!==DB.currentUserId)
    .map(u=>({u, score:matchScore(q,u)}))
    .sort((a,b)=>b.score-a.score);
  const best=cands[0];
  if(!best||best.score<=0){
    go("home"); renderHome();
    toast("已发布 🌸","暂时还没有特别契合的姐妹，妳的问题已进入烦恼屋等待回应","💭");
    return;
  }
  const a=best.u;
  const reasons=matchReasons(q,a);
  q.matchedTo=a.id; saveDB();
  go("home"); renderHome();
  openSheet(`<div class="center">
    <div class="avatar" style="margin:0 auto 10px;width:64px;height:64px;font-size:30px;">${avInner(a)}</div>
    <h3>为妳匹配到一位同频姐妹 ✨</h3>
    <div class="li-title">${a.nick} · ${a.age}岁 · ${a.region||a.country}</div>
    <p class="muted" style="font-size:13px;">${a.sign||""}</p>
   </div>
   <div class="card" style="margin-top:12px;text-align:left;">
     <div class="section-title">💡 系统为妳匹配的理由</div>
     ${reasons.map(r=>`<div style="margin:6px 0;">· ${r}</div>`).join("")}
   </div>
   <p class="field-hint center" style="margin-top:10px;">匹配后将开放 72 小时试聊，试聊后双方确认是否继续 🌷</p>
   <button class="btn block" style="margin-top:8px;" onclick="startTrialChat('${a.id}','${q.id}')">开始 72 小时试聊 →</button>
   <button class="btn ghost block" style="margin-top:10px;" onclick="closeSheet()">先放进烦恼屋</button>`, true);
}
function matchReasons(q,a){
  const u=me(); const r=[];
  const domainNeedMap={职业:"职场晋升",情感:"情感陪伴",心理:"心理支持",学业:"语言学习",创业:"创业经验",人际:"情感陪伴",兴趣:"教育经验"};
  if(a.skills.includes(domainNeedMap[q.domain])) r.push(`她在「${q.domain}」相关领域有经验，正好接得住妳`);
  const ce=(a.exp||[]).filter(x=>(u.exp||[]).includes(x)); if(ce.length) r.push(`妳们都经历过：${ce.join("、")}，更能懂彼此`);
  if(a.region===u.region&&u.region) r.push(`妳们都在 ${u.region}，距离很近`);
  const ch=(a.hobbies||[]).filter(x=>(u.hobbies||[]).includes(x)); if(ch.length) r.push(`共同爱好：${ch.slice(0,3).join("、")}`);
  if(a.mbti&&u.mbti) r.push(`MBTI ${u.mbti} × ${a.mbti}，沟通节奏比较合拍`);
  (q.priority||[]).forEach(p=>r.push(`妳选了「${p}」，她在这一点上得分很高`));
  return r.length?r.slice(0,5):["综合处境、需求与节奏，她和妳比较契合"];
}

/* ---- 关系/聊天 数据 ----
   rel.status : 'trial'（试聊） | 'linked'（正式深度链接） | 'casual'（闲聊·无状态） | 'ended'
   rel.type   : ''（试聊/闲聊） | 'mentorship' | 'buddy' | 'company'
   rel.mentorId / rel.menteeId : 仅 mentorship
   rel.endTrialBy : 有人申请结束试聊时记录其id（待对方回应）
*/
function ensureRelationship(otherId, opts){
  opts=opts||{};
  let rel=DB.relationships.find(r=> ((r.aId===DB.currentUserId&&r.bId===otherId)||(r.bId===DB.currentUserId&&r.aId===otherId)) && r.status!=="ended");
  if(!rel){
    rel={ id:uid("rel"), aId:DB.currentUserId, bId:otherId, members:[DB.currentUserId, otherId], type:opts.type||"", status:opts.status||"trial",
      period:opts.period||"", freq:opts.freq||"", goal:opts.goal||"", mentorId:"", menteeId:"",
      createdAt:now(), confirmedAt:0, checkins:[], gems:[], buddyList:[], moods:[], msgs:[], endTrialBy:"", paused:false, ended:false };
    DB.relationships.push(rel); DB.chats[rel.id]=[]; saveDB(); CW("relationships",rel);
  }
  return rel;
}
function saveRel(rel){ if(rel){ saveDB(); CW("relationships",rel); } }
function isMentee(rel){ return rel.menteeId===DB.currentUserId; }
function isMentor(rel){ return rel.mentorId===DB.currentUserId; }
function pushMsg(relId, fromId, text, kind){
  if(!DB.chats[relId]) DB.chats[relId]=[];
  DB.chats[relId].push({id:uid("m"),from:fromId,text,kind:kind||"text",at:now()});
  const rel=DB.relationships.find(r=>r.id===relId);
  if(rel){ rel.msgs=DB.chats[relId]; CW("relationships",rel); }
  saveDB();
}
function pushSys(relId, text){ pushMsg(relId, "sys", text, "sys"); }

function relName(rel){ const otherId=rel.aId===DB.currentUserId?rel.bId:rel.aId; return userById(otherId)||{nick:"姐妹",emoji:"🌸",id:otherId}; }
function relTypeLabel(rel){
  if(rel.status==="trial") return "试聊中 🌤";

    const role = isMentor(rel)?"我是Mentor🌟":(isMentee(rel)?"我是Mentee🌱":"");
    return "🎓 Mentorship"+(role?" · "+role:"");
  }
  return {buddy:"👯 搭子",company:"🫂 轻陪伴"}[rel.type]||"链接";
}

  if(rel.status==="trial") return "试聊 🌤";

function lastLine(r){

}
function relItem(r, showManage){
  const o=relName(r); const days=daysSince(r.confirmedAt||r.createdAt);
  const right = r.status==="linked"? "第"+days+"天" : (r.status==="trial"?"试聊中":"闲聊");
  const onClick = showManage ? `openRelManage('${r.id}')` : `openChat('${r.id}')`;
  return `<div class="list-item" onclick="${onClick}">
    <div class="avatar">${avInner(o)}</div>
    <div class="li-main"><div class="li-title">${o.nick} <span class="rel-tag">${relShortTag(r)}</span></div>
    <div class="li-sub">${lastLine(r)}</div></div>
    <div style="text-align:right;"><div class="li-sub">${right}</div>${showManage?'<div class="li-sub" style="color:var(--rose);">🏡 小屋</div>':'<div class="li-sub" style="color:var(--rose);">💬 聊天</div>'}</div>
  </div>`;
}
function renderTouch(){
  const body=document.getElementById("touchBody");
  const all=DB.relationships.filter(r=>!r.ended);
  const linked=all.filter(r=>r.status==="linked");
  const trials=all.filter(r=>r.status==="trial");
  const casuals=all.filter(r=>r.status==="casual");
  let html=`<div class="card" style="background:linear-gradient(135deg,#FBE7EC,#F3E9F5);text-align:center;margin-bottom:6px;">
      <h2 style="margin:0;">💞 妳的链接</h2>
      <p class="muted" style="font-size:12.5px;margin:6px 0 0;">深度链接进「关系小屋」用专属功能，试聊/闲聊点进去直接聊天 🌷</p>
    </div>`;
  if(!all.length){
    html+=`<div class="empty">还没有进行中的链接<br>去烦恼屋轻触或拉手，开启第一段链接吧～<br><br><button class="btn" onclick="navTo('home')">去烦恼屋看看 →</button></div>`;
    body.innerHTML=html; return;
  }
  if(linked.length){
    html+=`<div class="section-title">🏡 深度链接（${linked.length}）· 点进关系小屋</div>`;
    linked.forEach(r=>html+=relItem(r,true));
  }
  if(trials.length){
    html+=`<div class="section-title">🌤 试聊中（${trials.length}）</div>`;
    trials.forEach(r=>html+=relItem(r,false));
  }
  if(casuals.length){
    html+=`<div class="section-title">💬 闲聊（${casuals.length}）</div>`;
    casuals.forEach(r=>html+=relItem(r,false));
  }
  body.innerHTML=html;
}

/* ========== 关系小屋（深度链接管理 + 特殊功能）========== */
function openRelManage(relId){
  activeRel=DB.relationships.find(r=>r.id===relId);
  go("relmgmt");
  renderRelManage();
}
function renderRelManage(){
  const r=activeRel, o=relName(r);
  document.getElementById("rmSub").textContent=o.nick+" · "+relShortTag(r);
  const heroBg = r.type==="mentorship"?"linear-gradient(135deg,#FCEFE3,#FBE7EC)":r.type==="buddy"?"linear-gradient(135deg,#EAF3EC,#FBE7EC)":r.type==="company"?"linear-gradient(135deg,#F0E6F5,#FBE7EC)":"linear-gradient(135deg,#FBE7EC,#F3E9F5)";
  const days=daysSince(r.confirmedAt||r.createdAt);
  let html=`<div class="rm-hero" style="background:${heroBg}">
    <div class="avatar">${avInner(o)}</div>
    <div class="li-title" style="font-size:17px;">${o.nick}</div>
    <div class="rel-big">${relShortTag(r)} · 已建立 ${days} 天</div>
  </div>`;

  if(r.type==="mentorship"){
    const mentorN=userById(r.mentorId).nick, menteeN=userById(r.menteeId).nick;
    html+=`<div class="rm-goal">🎓 <b>${mentorN}</b> 是 Mentor 🌟　|　<b>${menteeN}</b> 是 Mentee 🌱</div>`;
    html+=`<div class="rm-goal">🎯 <b>成长目标：</b>${r.goal||"（未填写）"}</div>`;
    const pendingForMentor = isMentor(r) && r.checkins.some(c=>!c.reply);
    html+=`<div class="func-grid" style="margin-top:12px;">`;
    if(isMentee(r)){
      html+=`<div class="func-card" onclick="menteeCheckin()"><span class="fc-ic">✅</span><div class="fc-t">目标打卡</div><div class="fc-d">更新妳的进展</div></div>`;
    } else {
      html+=`<div class="func-card" style="position:relative;" onclick="viewCheckins()"><span class="fc-ic">📋</span><div class="fc-t">mentee的打卡</div><div class="fc-d">查看并鼓励她</div>${pendingForMentor?'<span class="badge-dot">待回应</span>':''}</div>`;
    }
    html+=`<div class="func-card" onclick="markGem()"><span class="fc-ic">⭐</span><div class="fc-t">成长金句</div><div class="fc-d">珍藏一句话</div></div>
      <div class="func-card" onclick="writeDiary()"><span class="fc-ic">📔</span><div class="fc-t">感受日记</div><div class="fc-d">只有妳可见</div></div>
      <div class="func-card" onclick="reviewCycle()"><span class="fc-ic">🎓</span><div class="fc-t">复盘 / 毕业</div><div class="fc-d">为这段画个句点</div></div>`;
    if(isMentor(r) && !CLOUD.enabled){
      html+=`<div class="func-card" onclick="simMenteeCheckin()"><span class="fc-ic">🧪</span><div class="fc-t">模拟mentee打卡</div><div class="fc-d">演示·体验通知</div></div>`;
    }
    html+=`</div>`;
  } else if(r.type==="buddy"){
    const done=r.buddyList.filter(b=>b.done).length;
    html+=`<div class="func-grid" style="margin-top:12px;">
      <div class="func-card" onclick="openBuddyList()"><span class="fc-ic">📝</span><div class="fc-t">搭子清单</div><div class="fc-d">${done}/${r.buddyList.length} 已完成</div></div>
      <div class="func-card" onclick="buddyCheckin()"><span class="fc-ic">🌟</span><div class="fc-t">今日打卡</div><div class="fc-d">并肩努力</div></div>
      <div class="func-card" onclick="writeDiary()"><span class="fc-ic">📔</span><div class="fc-t">感受日记</div><div class="fc-d">只有妳可见</div></div>
      <div class="func-card" onclick="endRelationship()"><span class="fc-ic">🍃</span><div class="fc-t">结束陪伴</div><div class="fc-d">温柔告别</div></div>
    </div>`;
  } else if(r.type==="company"){
    html+=`<div class="func-grid" style="margin-top:12px;">
      <div class="func-card" onclick="moodSticker()"><span class="fc-ic">💗</span><div class="fc-t">今天的心情</div><div class="fc-d">不说话也能表达</div></div>
      <div class="func-card" onclick="voiceNote()"><span class="fc-ic">🎤</span><div class="fc-t">语音小留言</div><div class="fc-d">异步·不催妳</div></div>
      <div class="func-card" onclick="writeDiary()"><span class="fc-ic">📔</span><div class="fc-t">感受日记</div><div class="fc-d">只有妳可见</div></div>
      <div class="func-card" onclick="endRelationship()"><span class="fc-ic">🍃</span><div class="fc-t">结束陪伴</div><div class="fc-d">温柔告别</div></div>
    </div>`;
  }

  // 共同底部
  html+=`<div class="func-card wide" style="margin-top:12px;" onclick="openChat('${r.id}')"><span class="fc-ic">💬</span><div><div class="fc-t">进入聊天</div><div class="fc-d">和 ${o.nick} 说说话</div></div></div>`;
  html+=`<div style="display:flex;gap:10px;margin-top:10px;">
    <button class="btn ghost block sm" onclick="togglePause()">${r.paused?"▶️ 恢复关系":"⏸️ 暂停关系"}</button>
    <button class="btn ghost block sm" onclick="endRelationship()">🍃 结束关系</button></div>
  <p class="field-hint center" style="margin-top:10px;">妳随时可以暂停或结束，系统不会问原因 🌸</p>`;
  document.getElementById("rmBody").innerHTML=html;
}

/* ---- 聊天界面（三种关系各有不同） ---- */
let activeRel=null;
function openChat(relId){
  activeRel=DB.relationships.find(r=>r.id===relId);
  const o=relName(activeRel);
  go("chat");
  document.getElementById("chatAvatar").innerHTML=avInner(o);
  document.getElementById("chatName").textContent=o.nick;
  document.getElementById("chatRel").textContent=relTypeLabel(activeRel)+(activeRel.paused?" · 已暂停":"");
  renderChatExtras();
  renderMsgs();
}
function renderChatExtras(){
  const r=activeRel;
  const goalBox=document.getElementById("chatGoal");
  const extra=document.getElementById("chatExtra");
  goalBox.innerHTML=""; extra.innerHTML="";
  if(r.status==="linked"){
    if(r.type==="mentorship") goalBox.innerHTML=`<div class="goal-banner">🎯 <b>成长目标：</b>${r.goal||"（未填写）"}</div>`;
    extra.innerHTML=`<span class="chip" onclick="openRelManage('${r.id}')">🏡 关系小屋 · 专属功能</span>`;
  } else if(r.status==="trial"){
    let chips=`<span class="chip" onclick="openTrialPanel('${r.id}')">🌤 试聊中 · 接下来怎么走？</span>`;
    if(r.proposal && r.proposal.by!==DB.currentUserId) chips=`<span class="chip" style="background:#FBE7EC;border-color:var(--rose);" onclick="viewProposal('${r.id}')">💞 对方邀请正式链接 · 查看</span>`+chips;
    if(r.endTrialBy && r.endTrialBy!==DB.currentUserId) chips=`<span class="chip" style="background:#FCEFE0;border-color:var(--apri);" onclick="respondEndTrial('${r.id}')">🍃 对方想结束试聊 · 回应</span>`+chips;
    extra.innerHTML=chips;
  } else if(r.status==="casual"){
    extra.innerHTML=`<span class="chip" onclick="upgradeFromTrial('${r.id}')">💞 升级为深度链接</span>
      <span class="chip" onclick="writeDiary()">📔 感受日记</span>`;
  }
}
function openTrialPanel(relId){
  const rel=DB.relationships.find(r=>r.id===relId);
  const o=relName(rel);
  openSheet(`<h3>试聊中 🌤</h3><p class="field-hint">没有倒计时，妳和 ${o.nick} 可以慢慢决定。怎么选都可以～</p>${trialActions(rel)}`);
}
function renderMsgs(){
  const box=document.getElementById("chatMsgs");
  const msgs=DB.chats[activeRel.id]||[];
  const lastIdx=msgs.length-1;
  box.innerHTML=msgs.map((m,i)=>{
    const fresh = i===lastIdx ? " fresh" : "";   // 只让最新一条淡入，其余不重播，避免整列闪烁
    if(m.from==="sys") return `<div class="msg sys${fresh}">${m.text}</div>`;
    const mine=m.from===DB.currentUserId;
    const tag = m.kind&&m.kind!=="text" ? `<span class="mtag">${m.kind}</span>`:"";
    return `<div class="msg ${mine?"me":"you"}${fresh}">${tag}${m.text}</div>`;
  }).join("");
  box.scrollTop=box.scrollHeight;
}
function sendChat(){
  const t=document.getElementById("chatText"); const v=t.value.trim(); if(!v) return;
  pushMsg(activeRel.id, DB.currentUserId, v); t.value="";
  const tx=document.getElementById("chatText"); if(tx) tx.style.height="auto";
  renderMsgs();
  // 云端：真实对话，对方会在她的设备上回复，不再自动代回
  if(!CLOUD.enabled){ setTimeout(()=>{ const o=relName(activeRel); pushMsg(activeRel.id,o.id,autoReply()); renderMsgs(); },1100); }
}
function autoReply(){ return ["嗯嗯我在听，妳慢慢说🤍","谢谢妳愿意和我分享～","抱抱妳，这真的不容易。","我懂妳的感受，我们一起想想办法🌸","妳已经做得很好了，真的。"][Math.floor(Math.random()*5)]; }

function backFromChat(){ navTo("touch"); }

/* ⚙️ 关系菜单：依状态不同 */
function openRelMenu(){
  const r=activeRel;
  if(r.status==="linked"){ openRelManage(r.id); return; }
  if(r.status==="trial"){ openTrialPanel(r.id); return; }
  // 闲聊
  openSheet(`<h3>闲聊设置 💬</h3>
    <div class="menu-item" style="margin:10px 0;" onclick="closeSheet();upgradeFromTrial('${r.id}')">💞 升级为深度链接<span>›</span></div>
    <div class="menu-item" style="margin:10px 0;" onclick="endRelationship()">🍃 结束这段闲聊<span>›</span></div>
    <p class="field-hint center">闲聊没有压力，想聊就聊，想结束也可以 🌸</p>`);
}
function togglePause(){
  activeRel.paused=!activeRel.paused; saveRel(activeRel); closeSheet();
  const cr=document.getElementById("chatRel"); if(cr&&currentScreen==="chat") cr.textContent=relTypeLabel(activeRel)+(activeRel.paused?" · 已暂停":"");
  if(currentScreen==="relmgmt") renderRelManage();
  toast(activeRel.paused?"已暂停 ⏸️":"已恢复 ▶️","节奏由妳决定","");
}
function endRelationship(){
  openSheet(`<h3 class="center">确认结束这段关系吗 🍃</h3><p class="center muted">谢谢妳们曾彼此陪伴。结束后会保留在记录里。</p>
    <button class="btn block" style="margin-top:14px;" onclick="confirmEnd()">温柔地结束</button>
    <button class="btn ghost block" style="margin-top:10px;" onclick="closeSheet()">再陪一会儿</button>`, true);
}
function confirmEnd(){ activeRel.ended=true; activeRel.status="ended"; saveRel(activeRel); closeSheet(); toast("已温柔结束 🍃","妳们走过的路都算数",""); navTo("touch"); }

/* ---- Mentorship 专属：目标打卡（mentee写 → mentor收通知 → mentor回应）---- */
function menteeCheckin(){
  if(!isMentee(activeRel)){ toast("只有 mentee 可以目标打卡哦 🌱","妳是这段关系里的 mentor",""); return; }
  openSheet(`<h3>目标打卡 ✅</h3><p class="field-hint">围绕妳的成长目标，更新这一阶段的进展。写完 mentor 会收到通知～</p>
    <div class="rm-goal" style="margin-bottom:10px;">🎯 ${activeRel.goal||"（未填写目标）"}</div>
    <textarea id="ckText" placeholder="这段时间我做到了… / 遇到的卡点是…"></textarea>
    <button class="btn block" style="margin-top:10px;" onclick="submitMenteeCheckin()">提交打卡 ✅</button>`);
}
function submitMenteeCheckin(){
  const v=document.getElementById("ckText").value.trim(); if(!v){ toast("写一点进展吧 🌱","",""); return; }
  const c={id:uid("ck"), by:activeRel.menteeId, text:v, at:now(), reply:null};
  activeRel.checkins.push(c);
  pushMsg(activeRel.id, activeRel.menteeId, v, "✅ 目标打卡");
  saveDB(); closeSheet();
  if(currentScreen==="relmgmt") renderRelManage();
  const menteeN=userById(activeRel.menteeId).nick;
  toast("打卡已提交 ✅","已通知 mentor，等她来鼓励妳～","🌱");
  if(CLOUD.enabled) return;   // 真实世界：mentor 会在她的设备上回应，不自动代回
  // 本地演示：模拟 mentor 收到通知并回应
  setTimeout(()=>{
    toast("妳的 mentor 看到啦 💛","稍等她的鼓励～","");
    setTimeout(()=>{
      const reply=["看到妳的进展啦，真为妳骄傲🌟","这一步走得很稳，继续保持～","卡点很正常，我们一起拆解，妳不是一个人💪","妳比上次更清晰了，我看得到妳的成长🌱"][Math.floor(Math.random()*4)];
      c.reply=reply; pushMsg(activeRel.id, activeRel.mentorId, reply, "💛 mentor回应"); saveDB();
      if(currentScreen==="chat"&&activeRel.id) renderMsgs();
    },1300);
  },800);
}
function viewCheckins(){
  const r=activeRel;
  const list=r.checkins;
  openSheet(`<h3>mentee 的打卡 📋</h3><p class="field-hint">看看 ${userById(r.menteeId).nick} 的进展，给她一点鼓励～</p>
    ${list.length?list.slice().reverse().map(c=>`<div class="card" style="margin:10px 0;">
        <div class="li-sub">${new Date(c.at).toLocaleString()}</div>
        <div style="margin:6px 0;">✅ ${c.text}</div>
        ${c.reply?`<div class="comment">💛 妳的回应：${c.reply}</div>`:`<div style="display:flex;gap:8px;margin-top:8px;"><input id="rp_${c.id}" placeholder="写句鼓励…" style="flex:1;"><button class="btn sm" onclick="replyCheckin('${c.id}')">鼓励</button></div>`}
      </div>`).join(""):'<p class="empty">mentee 还没有打卡</p>'}`);
}
function replyCheckin(cid){
  const c=activeRel.checkins.find(x=>x.id===cid);
  const v=document.getElementById("rp_"+cid).value.trim(); if(!v){ toast("写句话再发吧 💛","",""); return; }
  c.reply=v; pushMsg(activeRel.id, DB.currentUserId, v, "💛 mentor回应"); saveDB();
  viewCheckins();
  toast("已鼓励 mentee 💛","妳的支持对她很重要","");
}
function simMenteeCheckin(){
  // 演示：让（被模拟的）mentee 发一条打卡，mentor 收到通知
  const r=activeRel; const menteeN=userById(r.menteeId).nick;
  const samples=["这周按计划完成了作品集的前两页，虽然慢但在推进～","投了2份简历，还在调整心态，谢谢妳上次的建议。","坚持早起复习了三天，今天有点想放弃，来打个卡。"];
  const txt=samples[Math.floor(Math.random()*samples.length)];
  const c={id:uid("ck"), by:r.menteeId, text:txt, at:now(), reply:null};
  r.checkins.push(c); pushMsg(r.id, r.menteeId, txt, "✅ 目标打卡"); saveDB();
  if(currentScreen==="relmgmt") renderRelManage();
  toast("妳的 mentee（"+menteeN+"）完成一条目标打卡","快去鼓励她吧～","🌱");
  setTimeout(()=>viewCheckins(), 900);
}
function markGem(){
  const msgs=(DB.chats[activeRel.id]||[]).filter(m=>m.from!=="sys");
  if(!msgs.length){ toast("还没有可标记的内容 🌸","",""); return; }
  openSheet(`<h3>标记成长金句 ⭐</h3><p class="field-hint">选一句想珍藏的话</p>
    ${msgs.slice(-8).map((m,i)=>`<div class="bubble" style="display:block;margin:6px 0;text-align:left;" onclick="saveGem('${encodeURIComponent(m.text)}')">${m.text}</div>`).join("")}`);
}
function saveGem(t){ activeRel.gems.push({text:decodeURIComponent(t),at:now()}); saveRel(activeRel); closeSheet(); toast("已收藏成长金句 ⭐","在周期复盘时会再见到它",""); }
function reviewCycle(){
  openSheet(`<h3>周期复盘 🎓</h3><p class="field-hint">这段时间妳们走过了什么？各自写下感受，完成后彼此可见。</p>
    <textarea id="reviewText" placeholder="写下妳的复盘感受…"></textarea>
    ${activeRel.gems.length?`<div class="section-title">妳收藏的成长金句</div>${activeRel.gems.map(g=>`<div class="comment">⭐ ${g.text}</div>`).join("")}`:""}
    <div style="display:flex;gap:10px;margin-top:14px;">
      <button class="btn block" onclick="submitReview('renew')">续期 🌱</button>
      <button class="btn lav block" onclick="submitReview('graduate')">正式毕业 🎓</button>
    </div>`);
}
function submitReview(kind){
  const v=document.getElementById("reviewText").value.trim();
  if(v) pushMsg(activeRel.id, DB.currentUserId, v, "📔 周期复盘");
  if(kind==="graduate"){
    activeRel.graduated=true; activeRel.ended=true; activeRel.status="ended";
    const u=me(); u.graduatedWith=u.graduatedWith||[]; u.graduatedWith.push(relName(activeRel).nick);
    addTemp(50,"完成一段 mentorship 周期");
    pushSys(activeRel.id,"🎓 妳们完成了这段 mentorship，正式毕业。主页会留下「她陪我走过」的记录 🌷");
    saveDB(); closeSheet(); toast("毕业快乐 🎓","「她陪我走过」已记入妳的主页","🌷"); navTo("touch");
  } else {
    pushSys(activeRel.id,"🌱 妳们选择续期，继续这段旅程～"); saveDB(); closeSheet(); renderMsgs(); toast("已续期 🌱","","");
  }
}
/* ---- 搭子专属 ---- */
function openBuddyList(){
  openSheet(`<h3>搭子清单 📝</h3><p class="field-hint">记录想一起完成的事</p>
    ${activeRel.buddyList.map((b,i)=>`<div class="bubble ${b.done?"on":""}" style="display:block;margin:6px 0;text-align:left;" onclick="toggleBuddy(${i})">${b.done?"✅":"⬜"} ${b.text}</div>`).join("")||'<p class="muted center" style="font-size:13px;">还没有清单，添加一个吧～</p>'}
    <div style="display:flex;gap:8px;margin-top:12px;"><input id="buddyItem" placeholder="想一起做的事…" style="flex:1;"><button class="btn sm" onclick="addBuddyItem()">添加</button></div>`);
}
function addBuddyItem(){ const v=document.getElementById("buddyItem").value.trim(); if(!v) return; activeRel.buddyList.push({text:v,done:false}); saveRel(activeRel); openBuddyList(); }
function toggleBuddy(i){ activeRel.buddyList[i].done=!activeRel.buddyList[i].done; saveRel(activeRel); openBuddyList(); }
function buddyCheckin(){ pushMsg(activeRel.id, DB.currentUserId, "今天也在努力呀～", "🌟 今日打卡"); renderMsgs(); toast("打卡贴纸已送出 🌟","",""); }
/* ---- 轻陪伴专属 ---- */
function moodSticker(){
  const moods=["😊 还不错","😌 平静","🥲 有点低落","😪 好累","🥰 被温暖到","😶 说不上来"];
  openSheet(`<h3>今天的心情 💗</h3><p class="field-hint">不用说话，也能表达此刻的状态</p>

  DB.questions.forEach(q=>items.push({coll:"questions",id:q.id,kind:"问题",who:(userById(q.authorId)||{}).nick||"?",text:q.content,hidden:!!q.hidden,obj:q}));
  DB.posts.forEach(p=>{ items.push({coll:"posts",id:p.id,kind:"帖子",who:(userById(p.authorId)||{}).nick||"?",text:p.text,hidden:!!p.hidden,obj:p});
    (p.comments||[]).forEach((c,i)=>items.push({coll:"comment",id:p.id+"|"+i,kind:"评论",who:(userById(c.by)||{}).nick||"?",text:c.text,hidden:!!c.hidden,obj:c})); });
  DB.stories.forEach(s=>items.push({coll:"stories",id:s.id,kind:"故事",who:s.anon?"匿名":s.name,text:s.content,hidden:!!s.hidden,obj:s}));
  return items.sort((a,b)=>(b.obj.createdAt||0)-(a.obj.createdAt||0));
}
let modFilter="all";
function adminMod(){
  const items=allContent().filter(i=> modFilter==="all"?true: modFilter==="hidden"?i.hidden: i.kind===modFilter);
  const filters=[["all","全部"],["问题","问题"],["帖子","帖子"],["评论","评论"],["故事","故事"],["hidden","已隐藏"]];
  let html=`<div class="adm-card"><h4>🛡️ 内容审核（${allContent().length} 条）</h4>
    ${CLOUD.enabled?`<button class="adm-btn" onclick="adminLoadAllContent()">🔄 从云端加载更多内容</button><div class="adm-row" style="font-size:11px;">云端模式下「隐藏」对全员即时生效；「删除」仅能删自己创建的（删别人请在 Supabase 后台操作）。</div>`:""}
    <div class="adm-tabs">${filters.map(f=>`<span class="adm-tab ${modFilter===f[0]?"on":""}" onclick="setModFilter('${f[0]}')">${f[1]}</span>`).join("")}</div>
    ${items.length?items.map(i=>`<div class="adm-row ${i.hidden?"hidden-row":""}">
      <div class="meta">${i.kind} · ${i.who} ${i.hidden?"· 已隐藏":""}</div>${escapeHtml(i.text)}
      <div><button class="adm-btn ${i.hidden?"ok":"danger"}" onclick="toggleHide('${i.coll}','${i.id}')">${i.hidden?"恢复显示":"隐藏"}</button>
      <button class="adm-btn danger" onclick="modDelete('${i.coll}','${i.id}')">删除</button></div>
    </div>`).join(""):'<div class="adm-row">没有内容</div>'}</div>`;
  return html;
}
function setModFilter(f){ modFilter=f; renderAdmin("mod"); }
async function adminLoadAllContent(){
  if(!CLOUD.enabled) return;
  toast("加载中…","从云端拉取内容","");
  try{
    const [q,p,s]=await Promise.all([
      CLOUD.sb.from("questions").select("data").order("created_at",{ascending:false}).limit(200),
      CLOUD.sb.from("posts").select("data").order("created_at",{ascending:false}).limit(200),
      CLOUD.sb.from("stories").select("data").order("created_at",{ascending:false}).limit(200)
    ]);
    DB.questions=_rows(q); DB.posts=_rows(p); DB.stories=_rows(s);
    prefetchAuthors(DB.questions); prefetchAuthors(DB.posts);
    saveDB(); renderAdmin("mod"); toast("已加载 ✅","","");
  }catch(e){ logEvent("error","adminLoad: "+e.message); toast("加载失败","见运行日志",""); }
}
function findContentObj(coll,id){
  if(coll==="questions") return DB.questions.find(x=>x.id===id);
  if(coll==="posts") return DB.posts.find(x=>x.id===id);
  if(coll==="stories") return DB.stories.find(x=>x.id===id);
  if(coll==="comment"){ const [pid,idx]=id.split("|"); const p=DB.posts.find(x=>x.id===pid); return p&&p.comments[+idx]; }
  return null;
}
function toggleHide(coll,id){
  const o=findContentObj(coll,id); if(!o) return; o.hidden=!o.hidden; saveDB();
  if(coll==="comment"){ const p=DB.posts.find(x=>x.id===id.split("|")[0]); CW("posts",p); }
  else CW(coll,o);
  logEvent("info","审核："+(o.hidden?"隐藏":"恢复")+" "+coll); renderAdmin("mod"); refreshCurrentFeeds();
}
function modDelete(coll,id){
  if(coll==="comment"){ const [pid,idx]=id.split("|"); const p=DB.posts.find(x=>x.id===pid); if(p){ p.comments.splice(+idx,1); CW("posts",p); } }
  else if(coll==="questions"){ DB.questions=DB.questions.filter(x=>x.id!==id); CWdel("questions",id); }
  else if(coll==="posts"){ DB.posts=DB.posts.filter(x=>x.id!==id); CWdel("posts",id); }
  else if(coll==="stories"){ DB.stories=DB.stories.filter(x=>x.id!==id); CWdel("stories",id); }
  saveDB(); logEvent("info","审核删除 "+coll); renderAdmin("mod"); refreshCurrentFeeds();
}
function refreshCurrentFeeds(){ if(currentScreen==="home") renderHome(); if(currentScreen==="aware") renderAware(); }
function escapeHtml(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
/* ---- 数据管理 ---- */
function adminData(){
  return `<div class="adm-card"><h4>💾 数据管理</h4>
    <div class="adm-row">导出当前全部数据为 JSON（备份/排查问题）</div>
    <button class="adm-btn ok" onclick="exportData()">⬇️ 导出 JSON</button>
    <div class="adm-row" style="margin-top:10px;">导入 JSON（粘贴后覆盖当前数据）</div>
    <textarea id="importBox" placeholder="粘贴导出的 JSON…" style="background:#332A3B;border:1px solid #4A3D54;color:#fff;min-height:80px;"></textarea>
    <button class="adm-btn" onclick="importData()">⬆️ 导入并覆盖</button>
    <div class="adm-row" style="margin-top:10px;color:#F6A9A9;">危险操作：清空所有数据并重置演示</div>
    <button class="adm-btn danger" onclick="adminReset()">🗑️ 清空重置</button>
  </div>
  <div class="adm-card"><h4>📝 如何调整代码</h4>
    <div class="adm-row" style="font-size:12px;line-height:1.7;">这是单个 index.html 文件，所有逻辑都在 &lt;script&gt; 里。改代码＝直接编辑该文件后重新上传到 GitHub。控制台用于<b>线上排查与审核</b>：看报错、查数据、隐藏违规内容、导出备份。改完代码刷新页面即可生效。</div>
  </div>`;
}
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="touched-backup-"+Date.now()+".json"; a.click();
  toast("已导出 ⬇️","",""); logEvent("info","导出数据");
}
function importData(){
  try{ const d=JSON.parse(document.getElementById("importBox").value); DB=d; saveDB(); toast("导入成功 ✅","已覆盖当前数据",""); renderAdmin("overview"); }
  catch(e){ toast("JSON 解析失败 ❌",e.message,""); logEvent("error","导入失败:"+e.message); }
}
function adminReset(){
  openSheet(`<h3 class="center">确认清空所有数据？</h3><p class="center muted">将删除全部用户/问题/关系并恢复演示数据，不可撤销。</p>
    <button class="btn block" style="margin-top:12px;background:#D2615E;" onclick="resetDB()">确认清空重置</button>
    <button class="btn ghost block" style="margin-top:10px;" onclick="closeSheet()">取消</button>`, true);
}

/* ========== 启动 ========== */
function checkAdminHash(){ return /[#&](dev|admin)\b/i.test(location.hash); }
function boot(){
  loadDB();
  if(DB.devLog) DB.devLog.forEach(l=>DEV_LOG.push(l));
  logEvent("info","App 启动");
  if(cloudInit()){
    logEvent("info","云端共享社区已启用（Supabase）");
    let inited=false;
    CLOUD.sb.auth.onAuthStateChange(async function(event, session){
      const user = session && session.user;
      if(user){
        DB.currentUserId=user.id; cloudStart();
        if(CLOUD.authBusy){ inited=true; return; }   // 注册/登录流程自行导航
        if(checkAdminHash()){ openAdminGate(); inited=true; return; }
        let prof=null;
        try{ const r=await CLOUD.sb.from("users").select("data").eq("id",user.id).maybeSingle(); if(r.data&&r.data.data){ upsertUser(r.data.data); prof=r.data.data; } }catch(e){ logEvent("error","boot user: "+e.message); }
        if(prof && prof.nick){ go("home"); navTo("home"); }
        else { startProfile(); }   // 已登录但档案没填完 → 去填档案
      } else {
        DB.currentUserId=null;
        if(checkAdminHash()){ openAdminGate(); }
        else { go("welcome"); if(!inited) playWelcome(); }
      }
      inited=true;
    });
    return;
  }
  // 本地模式
  logEvent("info","本地模式（未配置云端）");
  const sess=getSession();
  if(sess && !(DB.currentUserId && me())) DB.currentUserId=sess;
  if(checkAdminHash()){ openAdminGate(); return; }
  if(DB.currentUserId){
    go("home"); navTo("home");
    if(me() && me().isNew && !DB.tutorialDone) startTutorial();
  } else {
    go("welcome"); playWelcome();
  }
}
window.addEventListener("hashchange", ()=>{ if(checkAdminHash()) openAdminGate(); });
boot();
</script>
